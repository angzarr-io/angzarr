{{- /*
  Envoy configuration for the angzarr-status REST sidecar.

  Phase 0 scope: serve the SPA static bundle (when present) and proxy
  /api/* HTTP requests to the local gRPC server via grpc_http1_bridge.
  No JSON transcoding yet — that lands when status protos carry
  google.api.http annotations (Phase 1+).

  Listening surfaces:
    :8080 — HTTP entry point for browsers / external REST clients
    :9901 — envoy admin (readiness / config dump / metrics)

  Reference: plans/virtual-spinning-flute.md (P6 transcoder sidecar).
*/}}
{{- if and .Values.infrastructure.status.enabled .Values.infrastructure.status.rest.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "angzarr.fullname" . }}-status-envoy
  labels:
    {{- include "angzarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
    angzarr.io/service: status
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901

    static_resources:
      listeners:
        - name: http_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.infrastructure.status.rest.port }}
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: angzarr_status
                    codec_type: AUTO
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: angzarr_status
                          domains: ["*"]
                          routes:
                            # /api/* → forward to the local Rust binary's gRPC
                            # surface. Phase 0: plain HTTP/2 forward (gRPC over
                            # the wire). When protos gain google.api.http
                            # annotations, swap in grpc_json_transcoder here.
                            - match:
                                prefix: "/api/"
                              route:
                                cluster: status_grpc
                                prefix_rewrite: "/"
                                # grpc-status carries on the response trailer
                                grpc_timeout_header_max: 30s
                            {{- if .Values.infrastructure.status.rest.web.enabled }}
                            # Everything else: serve the SPA bundle.
                            - match:
                                prefix: "/"
                              route:
                                cluster: spa_static
                            {{- end }}
                    http_filters:
                      # Bridges gRPC over HTTP/1.1 from the browser-side
                      # to HTTP/2 toward the upstream. Cheap to keep
                      # enabled; gets us gRPC-Web-style access today
                      # without the transcoder build-out.
                      - name: envoy.filters.http.grpc_http1_bridge
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_http1_bridge.v3.Config
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        # Local Rust binary — sidecar shares the pod network namespace
        # so localhost:1390 always resolves to the status container.
        - name: status_grpc
          connect_timeout: 1s
          type: STATIC
          http2_protocol_options: {}
          load_assignment:
            cluster_name: status_grpc
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: {{ .Values.infrastructure.status.grpcPort }}
        {{- if .Values.infrastructure.status.rest.web.enabled }}
        # SPA static-asset server. Envoy serves files directly from the
        # shared emptyDir volume populated by the web init-container.
        # NOTE: envoy doesn't have a native file-handler; in Phase 0
        # the web init-container is opt-in and may need a tiny static
        # server alongside. Keeping the cluster definition here so the
        # routing scaffold is in place.
        - name: spa_static
          connect_timeout: 1s
          type: STATIC
          load_assignment:
            cluster_name: spa_static
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          # Reserved for future static-file sidecar
                          # (e.g., nginx) when the SPA is built. Today
                          # this cluster is a placeholder — routes to
                          # "/" return 503 when web.enabled=true but
                          # nothing is listening on this port.
                          port_value: 8081
        {{- end }}
{{- end }}
