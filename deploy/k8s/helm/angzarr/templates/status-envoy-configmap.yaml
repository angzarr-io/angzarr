{{- /*
  Envoy configuration for the angzarr-status REST sidecar.

  Phase 1+: serve the SPA static bundle (when present) and transcode
  /api/* HTTP requests to the local gRPC server via
  grpc_json_transcoder. The transcoder honours `(google.api.http)`
  annotations declared on each service (e.g. DlqAdminService's
  `GET /api/dlq`, `POST /api/dlq/{id}/replay`).

  SECURITY POSTURE (C-14 remediation): we DO NOT use a wildcard
  `prefix_rewrite: "/"` + `grpc_http1_bridge`. That pattern silently
  exposed the FULL gRPC surface (Health, ServerReflection, internal
  admin RPCs) at `http://host:8080/<service>/<Method>` because the
  bridge filter forwards anything matching the prefix. We now declare
  an EXPLICIT `services` allowlist on the transcoder so only the
  whitelisted gRPC services are reachable over HTTP. Unlisted services
  (reflection, health, future admin RPCs) return 404 at the listener.

  The transcoder requires a proto FileDescriptorSet (built via
  `buf build` or `protoc --descriptor_set_out`) provided out-of-band
  in a ConfigMap (see `infrastructure.status.rest.descriptor.configMapName`
  in values.yaml). When that ConfigMap name is unset and `rest.enabled`
  is true, template rendering FAILS — fail-closed by design, so a
  half-configured chart never ships the open surface.

  Listening surfaces:
    :8080 — HTTP entry point for browsers / external REST clients
    :9901 — envoy admin (readiness / config dump / metrics)

  Reference: plans/virtual-spinning-flute.md (P6 transcoder sidecar)
             plans/deep-review-remediation.md (C-14)
*/}}
{{- if and .Values.infrastructure.status.enabled .Values.infrastructure.status.rest.enabled }}
{{- if not .Values.infrastructure.status.rest.descriptor.configMapName }}
{{- fail "infrastructure.status.rest.enabled=true requires infrastructure.status.rest.descriptor.configMapName to be set (a ConfigMap providing a FileDescriptorSet for the gRPC services exposed over HTTP). See C-14 in plans/deep-review-remediation.md." }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "angzarr.fullname" . }}-status-envoy
  labels:
    {{- include "angzarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
    angzarr.io/service: status
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901

    static_resources:
      listeners:
        - name: http_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: {{ .Values.infrastructure.status.rest.port }}
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: angzarr_status
                    codec_type: AUTO
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: angzarr_status
                          domains: ["*"]
                          routes:
                            # /api/* → transcode to local gRPC. The
                            # grpc_json_transcoder filter (declared
                            # below) only forwards calls that match a
                            # `(google.api.http)` annotation on a
                            # service in its `services` allowlist;
                            # anything else returns 404 before reaching
                            # the upstream cluster.
                            - match:
                                prefix: "/api/"
                              route:
                                cluster: status_grpc
                                # grpc-status carries on the response trailer
                                grpc_timeout_header_max: 30s
                            {{- if .Values.infrastructure.status.rest.web.enabled }}
                            # Everything else: serve the SPA bundle.
                            - match:
                                prefix: "/"
                              route:
                                cluster: spa_static
                            {{- end }}
                    http_filters:
                      # grpc_json_transcoder: honours (google.api.http)
                      # annotations declared on the proto services in
                      # the `services` allowlist below. Calls that do
                      # not match an annotated method are NOT forwarded
                      # — the filter rejects them at the listener.
                      #
                      # The `proto_descriptor` path is mounted from a
                      # ConfigMap referenced by
                      # `infrastructure.status.rest.descriptor.configMapName`.
                      # Build the descriptor with:
                      #   buf build -o angzarr-status-descriptors.pb
                      # then:
                      #   kubectl create configmap angzarr-status-descriptors \
                      #     --from-file=descriptors.pb=angzarr-status-descriptors.pb
                      - name: envoy.filters.http.grpc_json_transcoder
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoder
                          proto_descriptor: {{ printf "/etc/envoy/descriptors/%s" .Values.infrastructure.status.rest.descriptor.fileName | quote }}
                          # Explicit allowlist — ANY service NOT in this
                          # list is unreachable over the HTTP listener.
                          # Append to this list when a new admin RPC
                          # ships with a (google.api.http) annotation.
                          # Health, ServerReflection, and any internal
                          # gRPC are intentionally absent.
                          services:
                            - angzarr_client.proto.angzarr.status.DlqAdminService
                          print_options:
                            add_whitespace: false
                            always_print_primitive_fields: false
                            always_print_enums_as_ints: false
                            preserve_proto_field_names: false
                          # Reject requests that don't match a known
                          # transcoder method (the alternative would
                          # forward them as raw gRPC — defeats the
                          # allowlist).
                          request_validation_options:
                            reject_unknown_method: true
                            reject_unknown_query_parameters: true
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        # Local Rust binary — sidecar shares the pod network namespace
        # so localhost:1390 always resolves to the status container.
        - name: status_grpc
          connect_timeout: 1s
          type: STATIC
          http2_protocol_options: {}
          load_assignment:
            cluster_name: status_grpc
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          port_value: {{ .Values.infrastructure.status.grpcPort }}
        {{- if .Values.infrastructure.status.rest.web.enabled }}
        # SPA static-asset server. Envoy serves files directly from the
        # shared emptyDir volume populated by the web init-container.
        # NOTE: envoy doesn't have a native file-handler; in Phase 0
        # the web init-container is opt-in and may need a tiny static
        # server alongside. Keeping the cluster definition here so the
        # routing scaffold is in place.
        - name: spa_static
          connect_timeout: 1s
          type: STATIC
          load_assignment:
            cluster_name: spa_static
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: 127.0.0.1
                          # Reserved for future static-file sidecar
                          # (e.g., nginx) when the SPA is built. Today
                          # this cluster is a placeholder — routes to
                          # "/" return 503 when web.enabled=true but
                          # nothing is listening on this port.
                          port_value: 8081
        {{- end }}
{{- end }}
