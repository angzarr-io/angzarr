version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/angzarr-io/angzarr/gateway/gen
  disable:
    - file_option: go_package_prefix
      module: buf.build/googleapis/googleapis
plugins:
  # Generate Go protobuf code
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt:
      - paths=source_relative
  # Generate Go gRPC code
  - remote: buf.build/grpc/go
    out: gen
    opt:
      - paths=source_relative
  # Generate grpc-gateway code
  - remote: buf.build/grpc-ecosystem/gateway
    out: gen
    opt:
      - paths=source_relative
      - generate_unbound_methods=true
  # Generate OpenAPI v2 spec
  - remote: buf.build/grpc-ecosystem/openapiv2
    out: api
    opt:
      - allow_merge=true
      - merge_file_name=angzarr
inputs:
  - directory: ../angzarr-project/proto
  # H-42: also ingest core/main/proto so status-domain protos (e.g.
  # dlq_admin.proto, which carries (google.api.http) annotations on
  # DlqAdminService for REST transcoding) reach the gateway gen step.
  # Without this input, ListDeadLetters / GetDeadLetter / DeleteDeadLetter /
  # ReplayDeadLetter have no REST surface via this gateway and the
  # angzarr-status SPA cannot reach the DLQ admin tile.
  #
  # Path is relative to this buf.gen.yaml file (gateway/), so the status
  # proto tree sits one directory up at `../proto`.
  - directory: ../proto
